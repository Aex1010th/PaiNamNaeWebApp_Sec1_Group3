info:
  name: driver complete route
  type: https
  seq: 13

https:
  method: PATCH
  url: "{{base_url}}routes/{{route_id}}/status"
  headers:
    Authorization: Bearer {{driver_token}}
  body:
    type: json
    raw: |
      {
        "status":"COMPLETED"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code 200", () => {
          expect(res.getStatus()).to.equal(200);
        });
        
        test("Response time is less than 200ms", () => {
          expect(res.getResponseTime()).to.be.below(200);
        });