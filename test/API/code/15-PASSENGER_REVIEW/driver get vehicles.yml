info:
  name: driver get vehicles
  type: https
  seq: 9

https:
  method: GET
  url: "{{base_url}}vehicles"
  headers:
    Authorization: Bearer {{driver_token}}

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = JSON.parse(res.getBody());
        bru.setEnvVar("vehicle_id", body.data[0].id);

    - type: tests
      code: |-
        test("Status code 200", () => {
          expect(res.getStatus()).to.equal(200);
        });
        
        test("Response time is less than 200ms", () => {
          expect(res.getResponseTime()).to.be.below(200);
        });