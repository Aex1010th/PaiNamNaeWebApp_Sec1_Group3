info:
  name: admin update report status
  type: https
  seq: 8

https:
  method: PATCH
  url: "{{base_url}}reports/admin/{{report_id}}"
  headers:
    Authorization: Bearer {{admin_token}}
  body:
    type: json
    raw: |
      {
        "status":"RESOLVED"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code 200", () => {
          expect(res.getStatus()).to.equal(200);
        });
        
        test("Response time is less than 200ms", () => {
          expect(res.getResponseTime()).to.be.below(200);
        });